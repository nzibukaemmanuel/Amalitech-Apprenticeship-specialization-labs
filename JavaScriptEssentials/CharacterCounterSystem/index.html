<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Character Counter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo-area">
        <button class="brand-logo-button" type="button" aria-label="Character Counter home" title="Character Counter">
          <div class="brand-logo" aria-hidden="true">
            <div class="brand-logo-left"></div>
            <div class="brand-logo-right"></div>
          </div>
        </button>
        <span class="brand-name">Character Counter</span>
      </div>
      <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle dark and light theme">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4"></circle>
          <path d="M12 2v2"></path>
          <path d="M12 20v2"></path>
          <path d="M4.93 4.93l1.41 1.41"></path>
          <path d="M17.66 17.66l1.41 1.41"></path>
          <path d="M2 12h2"></path>
          <path d="M20 12h2"></path>
          <path d="M6.34 17.66l-1.41 1.41"></path>
          <path d="M19.07 4.93l-1.41 1.41"></path>
        </svg>
      </button>
    </header>

    <main id="main-content">
      <h1 class="title">Analyze your text<br>in real-time.</h1>

      <div class="textarea-container">
        <label class="sr-only" for="text-input">Text to analyze</label>
        <textarea id="text-input" placeholder="Start typing or paste your text here...">Design is the silent ambassador of your brand. Simplicity is key to effective communication, creating clarity in every interaction. A great design transforms complex ideas into elegant solutions, making them easy to understand. It blends aesthetics and functionality seamlessly.</textarea>
      </div>

      <div class="controls-row">
        <div class="checkbox-group" role="group" aria-label="Analysis options">
          <label class="checkbox-label" for="exclude-spaces">
            <input type="checkbox" id="exclude-spaces">
            <span class="custom-checkbox" aria-hidden="true"></span>
            Exclude Spaces
          </label>
          <label class="checkbox-label" for="enable-char-limit">
            <input type="checkbox" id="enable-char-limit" aria-controls="char-limit-input" aria-expanded="false">
            <span class="custom-checkbox" aria-hidden="true"></span>
            Set Character Limit
          </label>
          <label class="sr-only" for="char-limit-input">Character limit</label>
          <input type="number" id="char-limit-input" class="char-limit-input" min="1" placeholder="e.g. 200" aria-describedby="limit-hint" style="display:none;">
          <span id="limit-hint" class="sr-only">Only appears when the character limit option is selected.</span>
        </div>
        <p class="reading-time" aria-live="polite">
          Approx. reading time: <span id="reading-time">&lt;1 minute</span>
        </p>
      </div>

      <div class="metrics-grid" aria-label="Text statistics">

        <div class="card card-purple" id="chars-card">
          <div class="card-content" aria-live="polite" aria-atomic="true">
            <div class="card-number" id="total-characters">0</div>
            <div class="card-label">Total Characters</div>
          </div>
          <div class="pattern1">
            <div class="circle-grid">
              <span></span><span></span><span></span><span></span>
              <span></span><span></span><span></span><span></span>
              <span></span><span></span><span></span><span></span>
              <span></span><span></span><span></span><span></span>
            </div>
          </div>
        </div>

        <div class="card card-orange">
          <div class="card-content" aria-live="polite" aria-atomic="true">
            <div class="card-number" id="word-count">0</div>
            <div class="card-label">Word Count</div>
          </div>
          <div class="pattern2">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>

        <div class="card card-coral">
          <div class="card-content" aria-live="polite" aria-atomic="true">
            <div class="card-number" id="line-count">0</div>
            <div class="card-label">Line Count</div>
          </div>
          <div class="pattern3">
            <span class="cell"></span>
            <span class="cell"></span>
            <span class="cell"></span>
            <span class="cell"></span>
            <span class="cell"></span>
            <span class="cell"></span>
            <span class="cell"></span>
            <span class="cell"></span>
            <span class="cell"></span>
          </div>
        </div>

      </div>

      <section class="density-section" aria-labelledby="density-heading">
        <h2 id="density-heading">Letter Density</h2>
        <div class="density-list" id="density-list"></div>
        <div class="density-footer">
          <button class="toggle-density" id="toggle-density" type="button" aria-expanded="false">Show more</button>
        </div>
      </section>
    </main>
  </div>
  <script src="main.js"></script>

</body>
</html>
